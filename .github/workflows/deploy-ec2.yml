name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_PROJECT_PATH }}"

            # Serialize deploys across backend/frontend workflows on the same host.
            lock_file="/tmp/crowdfund-deploy.lock"
            if command -v flock >/dev/null 2>&1; then
              exec 9>"${lock_file}"
              flock -x 9
            fi

            git -C crowdfund-frontend fetch origin dev
            git -C crowdfund-frontend reset --hard origin/dev
            git -C crowdfund-frontend clean -fd

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "Docker Compose is not installed on EC2"
                exit 1
              fi
            }

            compose -p crowdfund up -d --build --no-deps frontend

            docker builder prune -af || true
            docker image prune -f || true
            docker volume prune -f || true
